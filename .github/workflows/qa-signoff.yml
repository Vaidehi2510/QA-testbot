name: QA Sign-off

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  workflow_dispatch:   # manual "Run workflow" button for demo

permissions:
  contents: read
  pull-requests: write   # to swap labels and post comments
  issues: write

jobs:
  qa-signoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const run = require('./qa-bot/signoff.js')
            await run({ github, context, core })
