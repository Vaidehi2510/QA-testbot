name: QA sync

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # and a manual "Run" button

permissions:
  contents: write              # to commit the roll-up in THIS repo

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: node src/run.js
        env:
          APP_ID: ${{ secrets.QA_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.QA_APP_PRIVATE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TARGET_OWNER: ${{ vars.TARGET_OWNER }}
          TARGET_REPO: ${{ vars.TARGET_REPO }}
          DRY_RUN: ${{ vars.DRY_RUN }}
      - name: Commit sync artifacts
        run: |
          git config user.name "qa-bot"
          git config user.email "qa-bot@users.noreply.github.com"
          for artifact in docs/QA_DASHBOARD.md state/*.json plans/*.md; do
            [ -e "$artifact" ] && git add "$artifact"
          done
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update QA sync artifacts"
          fi
          git push || echo "Nothing to push"
